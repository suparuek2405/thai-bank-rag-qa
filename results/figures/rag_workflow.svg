<svg viewBox="0 0 860 545" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', system-ui, sans-serif">
  <title>Thai Bank RAG System Workflow</title>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="545" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#f0f0f0" font-size="15" font-weight="700" letter-spacing="0.5">Thai Bank Financial Q&amp;A — RAG Pipeline</text>
  <text x="430" y="51" text-anchor="middle" fill="#666" font-size="10.5">10 banks · 51,674 chunks · all-MiniLM-L6-v2 · Gemini 2.5 Flash</text>

  <!-- ROW 1: USER QUERY -->
  <rect x="330" y="65" width="200" height="48" rx="10" fill="#1e2235" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="430" y="84" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="700" letter-spacing="1">USER QUERY</text>
  <text x="430" y="103" text-anchor="middle" fill="#c8d4e8" font-size="10">"What is KTB's NPL ratio?"</text>

  <line x1="430" y1="113" x2="430" y2="134" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ROW 2: QUERY ROUTER -->
  <rect x="330" y="134" width="200" height="48" rx="10" fill="#1e2a1e" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="430" y="154" text-anchor="middle" fill="#5cb85c" font-size="10" font-weight="700" letter-spacing="1">QUERY ROUTER</text>
  <text x="430" y="172" text-anchor="middle" fill="#c8e8c8" font-size="10">single-bank vs. cross-bank</text>

  <polyline points="330,158 175,158 175,216" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="245" y="149" text-anchor="middle" fill="#888" font-size="9">single-bank</text>

  <polyline points="530,158 685,158 685,216" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="614" y="149" text-anchor="middle" fill="#888" font-size="9">cross-bank</text>

  <!-- ROW 3: THREE BOXES -->
  <rect x="58" y="216" width="234" height="74" rx="10" fill="#1e1e2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="175" y="238" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="700" letter-spacing="1">FILTERED RETRIEVAL</text>
  <text x="175" y="256" text-anchor="middle" fill="#c8c0e8" font-size="10">where: {bank_name: KTB}</text>
  <text x="175" y="274" text-anchor="middle" fill="#c8c0e8" font-size="10">top-k = 10 chunks</text>

  <rect x="313" y="216" width="234" height="74" rx="10" fill="#2a1e0a" stroke="#e67e22" stroke-width="1.5"/>
  <text x="430" y="238" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="700" letter-spacing="1">ChromaDB</text>
  <text x="430" y="256" text-anchor="middle" fill="#e8d5c0" font-size="10">51,674 chunks (3 collections)</text>
  <text x="430" y="274" text-anchor="middle" fill="#e8d5c0" font-size="10">all-MiniLM-L6-v2 · 384-d</text>

  <rect x="568" y="216" width="234" height="74" rx="10" fill="#1e1e2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="685" y="238" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="700" letter-spacing="1">FULL RETRIEVAL</text>
  <text x="685" y="256" text-anchor="middle" fill="#c8c0e8" font-size="10">no bank filter applied</text>
  <text x="685" y="274" text-anchor="middle" fill="#c8c0e8" font-size="10">top-k = 10 chunks</text>

  <!-- Arrows into ChromaDB -->
  <line x1="292" y1="253" x2="311" y2="253" stroke="#888" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="568" y1="253" x2="549" y2="253" stroke="#888" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- ChromaDB to Top-k -->
  <line x1="430" y1="290" x2="430" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ROW 4: TOP-K CHUNKS -->
  <rect x="330" y="328" width="200" height="48" rx="10" fill="#1a1a22" stroke="#555" stroke-width="1.2"/>
  <text x="430" y="348" text-anchor="middle" fill="#aaa" font-size="10" font-weight="700" letter-spacing="1">TOP-K CHUNKS</text>
  <text x="430" y="366" text-anchor="middle" fill="#777" font-size="10">chunk text · page refs · bank</text>

  <line x1="430" y1="376" x2="430" y2="396" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ROW 5: GEMINI -->
  <rect x="305" y="396" width="250" height="72" rx="10" fill="#1e1424" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="430" y="418" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700" letter-spacing="1">GEMINI 2.5 FLASH</text>
  <text x="430" y="437" text-anchor="middle" fill="#e8c0c0" font-size="10">financial system prompt</text>
  <text x="430" y="455" text-anchor="middle" fill="#e8c0c0" font-size="10">stay grounded in retrieved context</text>

  <line x1="430" y1="468" x2="430" y2="488" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ROW 6: ANSWER -->
  <rect x="305" y="488" width="250" height="34" rx="8" fill="#1a2820" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="430" y="510" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="600">Answer + source page reference</text>

  <!-- EVAL SIDEBAR -->
  <rect x="710" y="396" width="118" height="90" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="769" y="416" text-anchor="middle" fill="#555" font-size="9" font-weight="700">RAGAS EVAL</text>
  <text x="769" y="432" text-anchor="middle" fill="#444" font-size="9">Faithfulness</text>
  <text x="769" y="447" text-anchor="middle" fill="#444" font-size="9">Context Precision</text>
  <text x="769" y="462" text-anchor="middle" fill="#444" font-size="9">Context Recall</text>
  <text x="769" y="479" text-anchor="middle" fill="#4a90d9" font-size="9">MLflow · SQLite</text>
  <line x1="710" y1="432" x2="555" y2="432" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
